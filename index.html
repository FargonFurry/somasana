<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>StudyHub – AI Study Assistant</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#3b82f6">
  <script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=01Mwokl2DBrNyKUo6zz1NoXcUM7zITz7g2hcls3yDXRBkUpLwmf7Sewa1vEzJO69ZaVEH8a6x2s5P7yN2-1ofIijeDzkmdNNzfxNpjM1YsDwovFfo2wBqFroT0D86IawK9cW7QdCvGiFOQWHG8ksva8qh6B7RPea9_PeNMRDiTvoH5A2-AmVzOXjGsvjZTfvXLPnA0YcTmgco55getXx5NmHZRc8noiYLDtAvGp5tcQ" charset="UTF-8"></script><script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/i18next@23.10.0/dist/umd/i18next.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f9fafb;
      --bg-secondary: #ffffff;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --accent: #3b82f6;
      --border: #e5e7eb;
    }
    .dark {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent: #38bdf8;
      --border: #334155;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); }
    
    /* Sidebar Hover Effect */
    #sidebar .sidebar-label { opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    #sidebar:hover .sidebar-label { opacity: 1; }
    
    /* Mobile Bottom Nav */
    @media (max-width: 768px) {
      #sidebar { display: none; }
      #bottom-nav { display: flex; }
    }
    
    @media (min-width: 769px) {
      #bottom-nav { display: none; }
    }

    .nav-item.active { color: var(--accent); }
    
    @media print {
      #sidebar, #header, #ai-interface, #bottom-nav, #status-widget { display: none !important; }
      #viewport { height: auto !important; overflow: visible !important; }
    }
  </style>
</head>
<body class="antialiased overflow-hidden">
  <div id="app" class="h-screen flex flex-col">
    <!-- Header -->
    <header id="header" class="h-16 bg-[var(--bg-secondary)] border-b border-[var(--border)] px-6 flex items-center justify-between z-50">
      <div class="flex items-center gap-2">
        <img src="/favicon.svg" alt="Logo" class="w-8 h-8">
        <span class="font-bold text-xl tracking-tight">StudyHub</span>
      </div>
      <div id="user-menu" class="hidden flex items-center gap-3">
        <span id="user-name" class="text-sm font-semibold hidden md:block">Student</span>
        <img id="user-avatar" src="/favicon.svg" class="w-8 h-8 rounded-full border border-[var(--border)]">
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <!-- Desktop Sidebar -->
      <aside id="sidebar" class="hidden w-20 hover:w-64 transition-all duration-300 bg-[var(--bg-secondary)] border-r border-[var(--border)] flex flex-col py-6 group">
        <div class="flex-1 space-y-2 px-4">
          <button data-tab="home" class="sidebar-item nav-item w-full flex items-center gap-4 p-3 rounded-xl hover:bg-black/5 transition">
            <span class="text-xl">🏠</span>
            <span class="sidebar-label font-semibold whitespace-nowrap">Home</span>
          </button>
          <button data-tab="study" class="sidebar-item nav-item w-full flex items-center gap-4 p-3 rounded-xl hover:bg-black/5 transition">
            <span class="text-xl">📚</span>
            <span class="sidebar-label font-semibold whitespace-nowrap">Study</span>
          </button>
          <button data-tab="plan" class="sidebar-item nav-item w-full flex items-center gap-4 p-3 rounded-xl hover:bg-black/5 transition">
            <span class="text-xl">📅</span>
            <span class="sidebar-label font-semibold whitespace-nowrap">Plan</span>
          </button>
          <button data-tab="community" class="sidebar-item nav-item w-full flex items-center gap-4 p-3 rounded-xl hover:bg-black/5 transition">
            <span class="text-xl">🤝</span>
            <span class="sidebar-label font-semibold whitespace-nowrap">Community</span>
          </button>
          <button data-tab="rewards" class="sidebar-item nav-item w-full flex items-center gap-4 p-3 rounded-xl hover:bg-black/5 transition">
            <span class="text-xl">🎁</span>
            <span class="sidebar-label font-semibold whitespace-nowrap">Rewards</span>
          </button>
        </div>
        <div class="px-4">
          <button data-tab="profile" class="sidebar-item nav-item w-full flex items-center gap-4 p-3 rounded-xl hover:bg-black/5 transition">
            <span class="text-xl">⚙️</span>
            <span class="sidebar-label font-semibold whitespace-nowrap">Settings</span>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 flex flex-col overflow-hidden relative">
        <div id="viewport" class="flex-1 overflow-y-auto p-6">
          <div id="viewport-content" class="max-w-6xl mx-auto"></div>
        </div>

        <!-- AI Interface -->
        <div id="ai-interface" class="h-1/3 bg-[var(--bg-secondary)] border-t border-[var(--border)] flex flex-col">
          <div class="p-2 border-b border-[var(--border)] flex items-center justify-between bg-[var(--bg-primary)]/50">
            <span class="text-xs font-bold uppercase tracking-widest text-[var(--text-secondary)] px-2">AI Assistant</span>
            <button id="toggle-ai-position" class="text-xs font-semibold text-[var(--accent)] hover:underline">Move to Top</button>
          </div>
          <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
          <div class="p-4 border-t border-[var(--border)] flex gap-2">
            <input type="text" id="chat-input" placeholder="Ask anything..." class="flex-1 bg-[var(--bg-primary)] border border-[var(--border)] rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-[var(--accent)]">
            <button id="send-chat" class="bg-[var(--accent)] text-white px-6 py-2 rounded-xl font-bold">Send</button>
          </div>
        </div>
      </main>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav id="bottom-nav" class="hidden h-16 bg-[var(--bg-secondary)] border-t border-[var(--border)] flex items-center justify-around px-2">
      <button data-tab="home" class="bottom-nav-item nav-item flex flex-col items-center gap-1">
        <span class="text-xl">🏠</span>
        <span class="text-[10px] font-bold">Home</span>
      </button>
      <button data-tab="study" class="bottom-nav-item nav-item flex flex-col items-center gap-1">
        <span class="text-xl">📚</span>
        <span class="text-[10px] font-bold">Study</span>
      </button>
      <button data-tab="plan" class="bottom-nav-item nav-item flex flex-col items-center gap-1">
        <span class="text-xl">📅</span>
        <span class="text-[10px] font-bold">Plan</span>
      </button>
      <button data-tab="community" class="bottom-nav-item nav-item flex flex-col items-center gap-1">
        <span class="text-xl">🤝</span>
        <span class="text-[10px] font-bold">Social</span>
      </button>
      <button data-tab="profile" class="bottom-nav-item nav-item flex flex-col items-center gap-1">
        <span class="text-xl">⚙️</span>
        <span class="text-[10px] font-bold">Profile</span>
      </button>
    </nav>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/alpha.js"></script>
  <script src="js/translation.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/gamification.js"></script>
  <script src="js/badges.js"></script>
  <script src="js/shop.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/social.js"></script>
  <script src="js/activity-feed.js"></script>
  <script src="js/flashcards.js"></script>
  <script src="js/study.js"></script>
  <script src="js/timetable.js"></script>
  <script src="js/goals.js"></script>
  <script src="js/plan.js"></script>
  <script src="js/rewards.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/onboarding.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
